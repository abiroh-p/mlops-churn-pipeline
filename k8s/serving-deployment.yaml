apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-serving
  labels:
    app: churn-serving
spec:
  replicas: 2
  selector:
    matchLabels:
      app: churn-serving
  template:
    metadata:
      labels:
        app: churn-serving
    spec:
      containers:
        - name: churn-serving
          image: churn-serving:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
            - name: AWS_ACCESS_KEY_ID
              value: "minioadmin"
            - name: AWS_SECRET_ACCESS_KEY
              value: "minioadmin"
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://minio:9000"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: churn-serving-service
spec:
  selector:
    app: churn-serving
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP